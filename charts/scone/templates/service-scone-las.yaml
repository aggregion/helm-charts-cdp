{{- if (.Values.las.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "scone.las.fullname" . }}-scone-las"
  labels:
    {{- include "scone.las.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  externalName: "{{ .Values.las.serviceExternalName }}"
  ports:
    - port: {{ .Values.las.ports.container }}
      targetPort: lasport
      protocol: TCP
      name: lasport
  selector:
    name: "{{ include "scone.las.fullname" . }}-scone-las"
{{- end }}
